name: Trustpilot Review Requests

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: trustpilot-review-requests
  cancel-in-progress: false

jobs:
  review-requests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Send Trustpilot review requests
        env:
          ADMIN_INGEST_TOKEN: ${{ secrets.ADMIN_INGEST_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          SITE_BYPASS_TOKEN: ${{ secrets.SITE_BYPASS_TOKEN }}
        run: |
          BASE_URL="${SITE_BASE_URL:-https://secretmousetickets.com}"
          EXTRA_HEADERS=()
          if [ -n "${SITE_BYPASS_TOKEN:-}" ]; then
            EXTRA_HEADERS+=(-H "OAI-Sites-Authorization: Bearer ${SITE_BYPASS_TOKEN}")
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${ADMIN_INGEST_TOKEN}" \
            "${EXTRA_HEADERS[@]}" \
            "${BASE_URL}/api/admin/trustpilot-review-requests"
