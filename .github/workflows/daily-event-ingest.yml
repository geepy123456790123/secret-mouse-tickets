name: Daily Event Ingest

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

concurrency:
  group: daily-event-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production event ingest
        env:
          ADMIN_INGEST_TOKEN: ${{ secrets.ADMIN_INGEST_TOKEN }}
          SEARCH_PROVIDER_ENDPOINT: https://secret-mouse-tickets.drgrant.workers.dev/api/search/disneyevent
          INGEST_ENDPOINT: https://secret-mouse-tickets.drgrant.workers.dev/api/admin/events
        run: npm run ingest:events
