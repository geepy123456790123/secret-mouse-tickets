name: Daily Event Ingest

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

concurrency:
  group: daily-event-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production event ingest
        env:
          ADMIN_INGEST_TOKEN: ${{ secrets.ADMIN_INGEST_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          SITE_BYPASS_TOKEN: ${{ secrets.SITE_BYPASS_TOKEN }}
        run: |
          BASE_URL="${SITE_BASE_URL:-https://secretmousetickets.com}"
          if [ -n "${SITE_BYPASS_TOKEN:-}" ]; then
            export OAI_SITES_AUTHORIZATION="Bearer ${SITE_BYPASS_TOKEN}"
          fi
          export SEARCH_PROVIDER_ENDPOINT="${BASE_URL}/api/search/disneyevent"
          export INGEST_ENDPOINT="${BASE_URL}/api/admin/events"
          npm run ingest:events
